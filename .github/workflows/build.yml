name: Build

on:
  push:
    branches: [ master ]
  pull_request:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: cstr-runner

    steps:
      # 🔥 CHECKOUT
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 🔥 MSVC
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 🔥 USE LOCAL TOOLS (Ninja, Rust, stb.)
      - name: Use local tools
        shell: pwsh
        run: |
          $env:PATH = "C:/Tools/ninja;C:/Program Files/CMake/bin;C:/Users/Castor/.cargo/bin;" + $env:PATH
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      # 🔥 VCPKG CACHE
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/Tools/vcpkg/installed
            C:/Tools/vcpkg/packages
            C:/Tools/vcpkg/buildtrees
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # 🔥 CARGO CACHE (EZ NAGY BOOST)
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            C:/Users/Castor/.cargo/registry
            C:/Users/Castor/.cargo/git
            _build/**/cargo/build
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # 🔥 VCPKG ENV
      - name: Setup VCPKG env
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=C:/Tools/vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows" >> $env:GITHUB_ENV
          echo "VCPKG_FEATURE_FLAGS=manifests,binarycaching" >> $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=clear;files,C:/Tools/vcpkg/packages,readwrite" >> $env:GITHUB_ENV

      # ✅ DEBUG (PRESET - STABIL)
      - name: Build Debug
        shell: pwsh
        run: |
          cmake --preset x64-Debug .
          cmake --build _build/x64-Debug -j12
          cmake --install _build/x64-Debug

      # ✅ RELEASE (PRESET - STABIL)
      - name: Build Release
        shell: pwsh
        run: |
          cmake --preset x64-Release .
          cmake --build _build/x64-Release -j12
          cmake --install _build/x64-Release

      # 🔥 DEBUG ARTIFACT
      - name: Copy Debug Artifacts
        shell: pwsh
        run: |
          mkdir _dist-debug
          Copy-Item _install/x64-Debug/bin/* -Destination _dist-debug/ -Recurse
          Copy-Item _install/x64-Debug/licenses -Destination _dist-debug/ -Recurse
          Copy-Item LICENSE -Destination _dist-debug/LICENSE

      # 🔥 RELEASE ARTIFACT
      - name: Copy Release Artifacts
        shell: pwsh
        run: |
          mkdir _dist-release
          Copy-Item _install/x64-Release/bin/* -Destination _dist-release/ -Recurse
          Copy-Item _install/x64-Release/licenses -Destination _dist-release/ -Recurse
          Copy-Item LICENSE -Destination _dist-release/LICENSE

      # 🔥 PDB MOVE
      - name: Move Release PDBs
        shell: pwsh
        run: |
          mkdir _dist-release-pdbs
          Get-ChildItem -Path _dist-release\* -Include *.pdb -Recurse | Move-Item -Destination _dist-release-pdbs

      # 🔥 SDK PACKAGE
      - name: Create SDK Dev Package
        shell: pwsh
        run: |
          mkdir _sdk
          Copy-Item cmake/sdk-dist.cmake -Destination _sdk/CMakeLists.txt
          Copy-Item _install/x64-Release/include -Destination _sdk/ -Recurse

          mkdir _sdk/release
          Copy-Item _install/x64-Release/lib -Destination _sdk/release/ -Recurse
          Copy-Item _install/x64-Release/bin -Destination _sdk/release/ -Recurse
          Remove-Item _sdk/release/bin/mods -Recurse
          Remove-Item _sdk/release/bin/dinput8.dll -ErrorAction SilentlyContinue
          Remove-Item _sdk/release/bin/dinput8.pdb -ErrorAction SilentlyContinue
          Remove-Item _sdk/release/bin/ResourceLib_HM3.dll -ErrorAction SilentlyContinue
          Remove-Item _sdk/release/bin/ResourceLib_HM3.pdb -ErrorAction SilentlyContinue
          Remove-Item _sdk/release/bin/crashpad_handler.exe -ErrorAction SilentlyContinue

          mkdir _sdk/debug
          Copy-Item _install/x64-Debug/lib -Destination _sdk/debug/ -Recurse
          Copy-Item _install/x64-Debug/bin -Destination _sdk/debug/ -Recurse
          Remove-Item _sdk/debug/bin/mods -Recurse
          Remove-Item _sdk/debug/bin/dinput8.dll -ErrorAction SilentlyContinue
          Remove-Item _sdk/debug/bin/dinput8.pdb -ErrorAction SilentlyContinue
          Remove-Item _sdk/debug/bin/ResourceLib_HM3.dll -ErrorAction SilentlyContinue
          Remove-Item _sdk/debug/bin/ResourceLib_HM3.pdb -ErrorAction SilentlyContinue
          Remove-Item _sdk/debug/bin/crashpad_handler.exe -ErrorAction SilentlyContinue

          mkdir _sdk/cmake
          Copy-Item cmake/zhm-mod.cmake -Destination _sdk/cmake/zhm-mod.cmake
          Copy-Item _install/x64-Release/licenses -Destination _sdk/ -Recurse
          Copy-Item LICENSE -Destination _sdk/LICENSE

      # 🔥 UPLOAD
      - name: Upload Debug
        uses: actions/upload-artifact@v4
        with:
          name: ZHMModSDK-Debug
          path: _dist-debug/*

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: ZHMModSDK-Release
          path: _dist-release/*

      - name: Upload Release PDBs
        uses: actions/upload-artifact@v4
        with:
          name: ZHMModSDK-Release-PDBs
          path: _dist-release-pdbs/*

      - name: Upload Dev SDK
        uses: actions/upload-artifact@v4
        with:
          name: DevPkg-ZHMModSDK
          path: _sdk/*
